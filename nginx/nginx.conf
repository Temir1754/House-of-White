server {
    listen 80;
    server_name howdesign.ae www.howdesign.ae;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name howdesign.ae www.howdesign.ae;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/howdesign.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdesign.ae/privkey.pem;

    location /api/ {
        client_max_body_size 200m;
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO-backed photo/file downloads — presigned URLs point here (bucket name = house-of-white)
    location /house-of-white/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
    }

    location ~* ^/(backend|nginx|db|\.git|\.env) {
        deny all;
        return 404;
    }

    # Clean URL for the no-login portal preview — internal rewrite, the
    # browser address bar stays at /demo instead of /portal.html?demo=1
    location = /demo {
        rewrite ^ /portal.html?demo=1 last;
    }

    # Old bookmarks/typed-in *.html URLs redirect (visibly, 301) to the
    # clean path now used sitewide, so the address bar never shows .html.
    location = /index.html {
        return 301 /$is_args$args;
    }
    location ~ ^/([^/]+)\.html$ {
        return 301 /$1$is_args$args;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
